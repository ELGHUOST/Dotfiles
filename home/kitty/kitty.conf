# Police
font_family      BlexMono Nerd Font
bold_fint        JetBrainsMono Nerd Font Bold
font_size        14

# Transparence
background_opacity 0.6

# Padding
window_padding_width 10

# Curseur
cursor_shape beam
cursor_blink_interval 0

# Blanc et bleu uniquement
foreground              #ffffff
background              #030608
cursor                  #58a6ff

# Normal
color0  #0d1117
color1  #58a6ff
color2  #58a6ff
color3  #58a6ff
color4  #58a6ff
color5  #58a6ff
color6  #58a6ff
color7  #ffffff

# Bright
color8  #2d3748
color9  #79c0ff
color10 #79c0ff
color11 #79c0ff
color12 #79c0ff
color13 #79c0ff
color14 #79c0ff
color15 #ffffff

hide_window_decorations yes
confirm_os_window_close 0
shell /run/current-system/sw/bin/zsh
tab_bar_style powerline
tab_powerline_style slanted
