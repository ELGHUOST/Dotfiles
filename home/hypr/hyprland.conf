# #######################################################################################
# CONFIG HYPRLAND
# #######################################################################################
source = ~/.cache/wal/colors-hyprland.conf
################
### MONITORS ###
################

monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi

#################
### AUTOSTART ###
#################
exec-once = swww-daemon
#exec-once = wal -R -n
exec-once = wal -i $(swww query | grep -oP "image: \K[^\s,]+" | head -1) -n
exec-once = env QML_IMPORT_PATH=/run/current-system/sw/lib/qt-6/qml quickshell
exec-once = swaync
exec-once = nm-applet &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swww img $(readlink -f ~/wallpapers/current) --transition-type fade
#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = PATH,$HOME/.local/bin:$PATH

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = $color1 $color2 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10, default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1,  easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear,       popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 1.94, almostLinear, fade
    animation = workspacesIn,  1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor,    1, 7,    quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

############
### ROFI ###
############

layerrule = blur, rofi
layerrule = ignorezero, rofi

#############
### INPUT ###
#############

input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = Alt

# -------------------------
# Launchers
# -------------------------
#bind = $mainMod, SPACE, exec, rofi -show drun
bind = $mainMod, TAB,   exec, rofi -show window
bind = CTRL SHIFT, UP, exec, hyprctl dispatch opacity 0.95 active
bind = CTRL SHIFT, DOWN, exec, hyprctl dispatch opacity 0.75 active
# -------------------------
# Screenshots
# -------------------------
bind = $mainMod, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy
# -------------------------
# Apps
# -------------------------
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, thunar
bind = SUPER, I, exec, moonlight

# -------------------------
# Réseau / Bluetooth / Affichage
# -------------------------
bind = $mainMod, N, exec, hyprltm-net
bind = $mainMod, B, exec, blueman-manager
bind = $mainMod, G, exec, nwg-displays

# -------------------------
# WM
# -------------------------
bind = $mainMod, C, killactive,
#bind = $mainMod, M, exec, hyprlock --config ~/.config/hyprlock/layouts/layout12.conf
bind = $mainMod, M, exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, F, exec, ~/.config/hypr/scripts/toggle-waybar.sh
bind = $mainMod SHIFT, B, exec, pkill waybar; waybar &

# -------------------------
# Scratchpad terminal
# -------------------------
bind = $mainMod, code:49, exec, ~/.config/hypr/scripts/scratchpad.sh
bind = $mainMod SHIFT, code:49, movetoworkspace, special:scratchpad

# -------------------------
# Notifications
# -------------------------
bind = $mainMod, R, exec, swaync-client -t -sw

# -------------------------
# Focus
# -------------------------
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# -------------------------
# Workspaces
# -------------------------
bind = $mainMod, F1,  workspace, 1
bind = $mainMod, F2,  workspace, 2
bind = $mainMod, F3,  workspace, 3
bind = $mainMod, F4,  workspace, 4
bind = $mainMod, F5,  workspace, 5
bind = $mainMod, F6,  workspace, 6
bind = $mainMod, F7,  workspace, 7
bind = $mainMod, F8,  workspace, 8
bind = $mainMod, F9,  workspace, 9
bind = $mainMod, F10, workspace, 10

bind = $mainMod SHIFT, F1,  movetoworkspace, 1
bind = $mainMod SHIFT, F2,  movetoworkspace, 2
bind = $mainMod SHIFT, F3,  movetoworkspace, 3
bind = $mainMod SHIFT, F4,  movetoworkspace, 4
bind = $mainMod SHIFT, F5,  movetoworkspace, 5
bind = $mainMod SHIFT, F6,  movetoworkspace, 6
bind = $mainMod SHIFT, F7,  movetoworkspace, 7
bind = $mainMod SHIFT, F8,  movetoworkspace, 8
bind = $mainMod SHIFT, F9,  movetoworkspace, 9
bind = $mainMod SHIFT, F10, movetoworkspace, 10

# -------------------------
# Workspace spécial
# -------------------------
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, SPACE, exec, qs ipc call launcher toggle
bind = $mainMod, W, exec, qs ipc call wallpaper toggle
bind = $mainMod SHIFT, W, exec, ~/.config/scripts/random-wallpaper.sh
bind = $mainMod, A, exec, qs ipc call dashboard toggle
bind = $mainMod, O, exec, qs ipc call music toggle
# -------------------------
# Scroll workspaces
# -------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# -------------------------
# Souris
# -------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -------------------------
# Swap fenêtres
# -------------------------
bind = $mainMod SHIFT, left,  swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up,    swapwindow, u
bind = $mainMod SHIFT, down,  swapwindow, d

# -------------------------
# Volume
# -------------------------
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# -------------------------
# Luminosité
# -------------------------
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# -------------------------
# Média
# -------------------------
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# -------------------------
# Scratchpad rules
# -------------------------
windowrulev2 = float, title:scratchpad
windowrulev2 = size 70% 60%, title:scratchpad
windowrulev2 = center, title:scratchpad
windowrulev2 = opacity 0.95, title:scratchpad
windowrulev2 = opacity 0.85 0.85, class:^(codium)$
